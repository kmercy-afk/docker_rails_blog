default: &default
  adapter: postgresql
  encoding: unicode
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "password") %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  pool: 5

development:
  <<: *default
  database: docker_rails_blog_development

test:
  <<: *default
  database: docker_rails_blog_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>