default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: rails_blog_development

test:
  <<: *default
  database: rails_blog_test

# Production - Use DATABASE_URL from Render (Recommended)
production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>